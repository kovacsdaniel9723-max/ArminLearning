name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npx expo export -p web

      - name: Prepare static site
        run: |
          touch dist/.nojekyll
          # SPA: ismeretlen útvonalak → index.html (Expo web client routing)
          if [ ! -f dist/404.html ]; then
            cp dist/index.html dist/404.html
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        id: deploy
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Configure GitHub Pages (gh-pages branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/${{ github.repository }}/pages"
          HDR=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28")
          BODY='{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}'
          CODE=$(curl -sS -o /tmp/pages.json -w "%{http_code}" -X POST "${HDR[@]}" "$API" -d "$BODY")
          echo "POST /pages → HTTP ${CODE}"
          cat /tmp/pages.json
          if [ "$CODE" != "201" ] && [ "$CODE" != "200" ]; then
            curl -sS -X PUT "${HDR[@]}" "$API" -d "$BODY" | tee /tmp/pages_put.json
          fi
          echo ""
          echo "Site URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
