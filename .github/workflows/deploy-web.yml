name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Ne szakítsuk meg futó workflow-t: a megszakított Pages deploy beragadhat.
concurrency:
  group: pages-web
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npx expo export -p web

      - name: Prepare static site
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Cancel stuck Pages deployments
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const active = new Set(['queued', 'building', 'in_progress', 'purging_cdn']);
            for (let attempt = 1; attempt <= 3; attempt++) {
              const { data: deployments } = await github.rest.repos.listPagesDeployments({
                owner,
                repo,
                per_page: 30,
              });
              let cancelled = 0;
              for (const d of deployments) {
                if (!active.has(d.status)) continue;
                try {
                  await github.rest.repos.cancelPagesDeployment({
                    owner,
                    repo,
                    pages_deployment_id: d.id,
                  });
                  core.info(`Cancelled deployment ${d.id} (${d.status})`);
                  cancelled++;
                } catch (error) {
                  core.warning(`Cancel ${d.id} failed: ${error.message}`);
                }
              }
              if (cancelled === 0) break;
              core.info(`Waiting 15s before recheck (attempt ${attempt}/3)`);
              await new Promise((resolve) => setTimeout(resolve, 15000));
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 900000

      - name: Site URL
        run: echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
