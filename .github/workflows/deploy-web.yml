name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npx expo export -p web

      - name: Prepare docs folder for GitHub Pages
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll
          cp docs/index.html docs/404.html

      - name: Commit and push docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --staged --quiet; then
            echo "No doc changes to publish"
          else
            git commit -m "Deploy web to docs [skip ci]"
            git push origin HEAD:main
          fi

      - name: Enable GitHub Pages (main /docs)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const source = { branch: 'main', path: '/docs' };
            try {
              await github.rest.repos.createPagesSite({
                owner,
                repo,
                build_type: 'legacy',
                source,
              });
              core.info('GitHub Pages created: main /docs');
            } catch (error) {
              if (error.status === 409) {
                await github.rest.repos.updateInformationAboutPagesSite({
                  owner,
                  repo,
                  build_type: 'legacy',
                  source,
                });
                core.info('GitHub Pages updated: main /docs');
              } else {
                core.warning(`Pages API: ${error.message}`);
                core.warning('Enable manually: Settings → Pages → Deploy from branch → main → /docs');
              }
            }

      - name: Site URL
        run: echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
