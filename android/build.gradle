// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Define Android build configuration variables
// These are typically provided by Expo/React Native plugins, but we define defaults here
ext {
  // Android SDK versions - Expo SDK 54 compatible
  compileSdkVersion = 35
  targetSdkVersion = 35
  minSdkVersion = 23
  buildToolsVersion = "35.0.0"
  
  // NDK version - will be set by React Native plugin if available
  ndkVersion = "27.0.12077973"
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
