name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Pages (GitHub Actions source)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.createPagesSite({
                owner,
                repo,
                build_type: 'workflow',
              });
              core.info('GitHub Pages enabled: GitHub Actions');
            } catch (error) {
              if (error.status === 409) {
                await github.rest.repos.updateInformationAboutPagesSite({
                  owner,
                  repo,
                  build_type: 'workflow',
                });
                core.info('GitHub Pages switched to GitHub Actions');
              } else {
                core.warning(`Pages API: ${error.message}`);
              }
            }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npx expo export -p web

      - name: Prepare static site
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Site URL
        run: echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
