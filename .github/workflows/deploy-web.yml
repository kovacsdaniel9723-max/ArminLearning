name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Egy deploy egyszerre – megszakítás beragadt Pages lockot hagyhat.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Ensure Pages uses GitHub Actions (not branch /docs)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.request('PUT /repos/{owner}/{repo}/pages', {
              owner,
              repo,
              build_type: 'workflow',
            });
            core.info('Pages source: GitHub Actions');

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npx expo export -p web

      - name: Prepare static site
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Site URL
        run: echo "Published at https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
