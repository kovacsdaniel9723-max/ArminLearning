name: Deploy Web to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  setup-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages (workflow build)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          API="https://api.github.com/repos/${{ github.repository }}/pages"
          HEADERS=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28")
          STATUS=$(curl -sS -o /tmp/pages_resp.json -w "%{http_code}" -X POST "${HEADERS[@]}" "$API" -d '{"build_type":"workflow"}')
          echo "POST /pages → HTTP ${STATUS}"
          cat /tmp/pages_resp.json || true
          if [ "$STATUS" = "409" ] || [ "$STATUS" = "422" ]; then
            echo "Pages already exists or legacy mode – switching to workflow build_type"
            curl -sS -X PUT "${HEADERS[@]}" "$API" -d '{"build_type":"workflow"}' | tee /tmp/pages_put.json
          fi

  build:
    needs: setup-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npx expo export -p web

      - name: Add .nojekyll for static assets
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
